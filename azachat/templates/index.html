<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AzaChat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="chat-container">

    <div class="header">
        💬 AzaChat | {{ user }}
        <a href="/logout" style="color:white; float:right;">Выйти</a>
    </div>

    <div class="messages">

        {% for user_name, message in messages %}
            
            <div class="message {% if user_name == user %}user{% else %}bot{% endif %}">
                <b>{{ user_name }}:</b> {{ message }}
            </div>

        {% endfor %}

    </div>

    <form class="input-box" method="POST" action="/send">
        <input type="text" name="message" placeholder="Напиши сообщение..." required>
        <button type="submit">➤</button>
    </form>

</div>

</body>
</html>
